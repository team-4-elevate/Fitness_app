name: SonarCloud Analysis

on:
  push:
    branches: [main, development]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.3'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Run build_runner
      run: flutter pub run build_runner build --delete-conflicting-outputs

    - name: Run tests with coverage
      id: tests
      continue-on-error: true 
      run: flutter test --coverage

    - name: Check test results and notify
      if: steps.tests.outcome == 'failure'
      run: |
        echo "⚠️ WARNING: Tests failed but continuing with SonarCloud analysis"
        echo "::warning::Tests failed - please check and fix failing tests"
        echo "Failed tests detected at $(date)"

    - name: Generate coverage summary
      if: always()  
      run: |
        if [ -f "coverage/lcov.info" ]; then
          echo "Coverage file generated successfully"
        else
          echo "No coverage file found, creating empty one"
          mkdir -p coverage
          touch coverage/lcov.info
        fi

    - name: SonarCloud Scan
      if: always() 
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Final Status Summary
      if: always()
      run: |
        if [ "${{ steps.tests.outcome }}" == "failure" ]; then
          echo "Tests failed but SonarCloud analysis completed"
          echo "Please fix the failing tests in your next commit"
        else
          echo "All steps completed successfully"
        fi
