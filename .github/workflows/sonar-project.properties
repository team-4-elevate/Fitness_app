# Project identification
sonar.projectKey=team-4-elevate_fitness_app
sonar.organization=team-4-elevate

# Project information
sonar.projectName=Fitness App
sonar.projectVersion=1.0

# Source configuration
sonar.sources=lib
sonar.tests=test

# Exclusions for generated files
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.gr.dart,**/*.config.dart,**/generated/**,**/*.pb.dart,**/build/**

# Test coverage
sonar.dart.coverage.reportPaths=coverage/lcov.info

# Coverage exclusions
sonar.coverage.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.gr.dart,**/*.config.dart,**/test/**,**/generated/**

# Additional settings
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
